<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n.navtkorn</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --accent: #c8ff00;
    --accent2: #00d4ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans Thai', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 0 0 60px 0;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  /* ===== HERO HEADER ===== */
  .hero {
    position: relative;
    height: 260px;
    overflow: hidden;
    background: #000;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 70% 40%, #1a2a1a 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 20% 70%, #0a1a2a 0%, transparent 60%),
      linear-gradient(135deg, #050505 0%, #111 50%, #080808 100%);
  }

  /* Animated swirl blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    animation: float 6s ease-in-out infinite;
  }
  .blob-1 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(200,255,0,0.12), transparent 70%);
    top: -40px; right: -20px;
    animation-delay: 0s;
  }
  .blob-2 {
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(0,212,255,0.10), transparent 70%);
    bottom: -30px; left: 30px;
    animation-delay: -3s;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-15px) scale(1.05); }
  }

  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 50px 28px 0;
  }

  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #222, #333);
    border: 2.5px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    overflow: hidden;
    box-shadow: 0 0 24px rgba(200,255,0,0.25);
  }

  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1.5px solid rgba(200,255,0,0.3);
    animation: spin 8s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .hero-info { flex: 1; }

  .hero-name {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1.1;
  }

  .hero-handle {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  /* Social icons row */
  .social-icons {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 28px;
    padding: 0 28px;
  }

  .social-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s ease;
    backdrop-filter: blur(10px);
  }
  .social-icon:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(200,255,0,0.2);
  }
  .social-icon svg { width: 18px; height: 18px; fill: currentColor; }

  /* Hero bottom fade */
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 20px;
    background: linear-gradient(to bottom, transparent, var(--bg));
    z-index: 3;
  }

  /* ===== BODY CONTENT ===== */
  .body {
    padding: 0px 20px 0;
  }

  /* Section label */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-align: center;
    margin: 28px 0 14px;
    text-transform: uppercase;
  }

  /* About box */
  .about-box {
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 13.5px;
    line-height: 1.7;
    color: #aaa;
    background: rgba(255,255,255,0.015);
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.1s;
  }

  /* ===== LINK CARDS ===== */
  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    text-decoration: none;
    color: var(--text);
    margin-bottom: 10px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  .link-card:nth-child(1) { animation-delay: 0.15s; }
  .link-card:nth-child(2) { animation-delay: 0.25s; }
  .link-card:nth-child(3) { animation-delay: 0.35s; }

  .link-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .link-card.ig::before { background: linear-gradient(to bottom, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .link-card.yt::before { background: #ff0000; }
  .link-card.tt::before { background: linear-gradient(to bottom, #010101, #69C9D0, #EE1D52); }

  .link-card:hover {
    border-color: #3a3a3a;
    transform: translateX(4px);
    background: #1f1f1f;
  }
  .link-card:hover::before { opacity: 1; }

  .link-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .link-icon svg { width: 20px; height: 20px; }

  .link-text { flex: 1; }
  .link-name {
    font-weight: 600;
    font-size: 14.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .link-sub {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 2px;
  }

  .link-arrow {
    color: var(--muted);
    flex-shrink: 0;
  }

  /* Follower badge */
  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .badge.gold { border-color: rgba(200,255,0,0.3); color: var(--accent); }

  /* ===== ANIMATIONS ===== */

    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 32px 20px 0;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #333;
    letter-spacing: 1px;
  }
  .footer span { color: var(--accent); }
</style>
</head>
